name: "Opsmaru Pakman"
author: "Zack Siri"
branding:
  icon: "package"
  color: "purple"
description: "Builds project into alpine package to be deployed using opsmaru.com"
inputs:
  alpine:
    description: |
      Alpine linux version to use (edge | latest-stable | v3.x | 3.x)
      Bare versions like 3.20 are normalized to v3.20.
    required: true
runs:
  using: composite
  steps:
    - name: Create Mix Directory
      run: |
        mkdir -p ~/.mix
        mkdir -p ~/packages
        mkdir -p ~/artifacts
      shell: bash

    - name: Normalize Alpine Version
      id: normalize-alpine
      run: |
        alpine="$ALPINE_VERSION"
        if [[ "$alpine" =~ ^[0-9]+\.[0-9]+$ ]]; then
          alpine="v$alpine"
        fi
        echo "branch=$alpine" >> "$GITHUB_OUTPUT"
      shell: bash
      env:
        ALPINE_VERSION: ${{ inputs.alpine }}

    - name: Resolve Pakman Ref
      id: pakman-ref
      run: |
        ref="$ACTION_REF"
        if [[ -z "$ref" ]]; then
          ref="develop"
        fi
        echo "ref=$ref" >> "$GITHUB_OUTPUT"
      shell: bash
      env:
        ACTION_REF: ${{ github.action_ref }}

    - name: Setup Alpine
      uses: upmaru/setup-alpine@v1
      with:
        branch: ${{ steps.normalize-alpine.outputs.branch }}
        packages: |
          zip
          tar
          sudo
          cmake
          elixir
          coreutils
          alpine-sdk
        volumes: |
          /home/runner/.mix:/home/runner/.mix
          /home/runner/packages:/home/runner/packages
          /home/runner/artifacts:/home/runner/artifacts

    - name: Prepare Runner User
      run: |
        sudo addgroup runner abuild
        echo "/home/runner/.mix/escripts" >> $GITHUB_PATH
      shell: alpine.sh {0}

    - name: Cache Pakman
      id: cache-pakman
      uses: actions/cache@v5
      with:
        path: ~/.mix
        key: ${{ runner.arch }}-alpine-${{ steps.normalize-alpine.outputs.branch }}-pakman-${{ steps.pakman-ref.outputs.ref }}

    - name: Install Pakman
      if: steps.cache-pakman.outputs.cache-hit != 'true'
      run: |
        mix local.rebar --force
        mix local.hex --force
        mix escript.install github upmaru/pakman ref "$PAKMAN_REF" --force
      shell: alpine.sh {0}
      env:
        MIX_ENV: prod
        PAKMAN_REF: ${{ steps.pakman-ref.outputs.ref }}
